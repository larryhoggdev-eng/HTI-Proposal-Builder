<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTI Polymer - Proposal Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://unpkg.com/html-docx-js/dist/html-docx.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .top-bar {
    display: flex; align-items: center; gap: 16px; background: #16213e; padding: 10px 20px;
    border-bottom: 3px solid #e2a308; flex-shrink: 0; flex-wrap: wrap;
  }
  .top-bar h1 { color: #e2a308; font-size: 18px; white-space: nowrap; margin-right: 8px; }
  .top-bar .bar-section { display: flex; align-items: center; gap: 8px; }
  .top-bar .bar-section label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .top-bar select, .top-bar input { padding: 6px 8px; background: #0f3460; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 12px; font-family: inherit; }
  .top-bar select:focus, .top-bar input:focus { border-color: #e2a308; outline: none; }
  .top-bar .btn { padding: 8px 16px; font-size: 12px; }

  .main-content { display: flex; flex: 1; overflow: hidden; }
  .form-section { background: #1a1a2e; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #2a2a4a; }
  .form-section h3 { color: #e2a308; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 6px; }
  .form-row { margin-bottom: 8px; }
  .form-row label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 7px 9px; background: #0f3460; border: 1px solid #333; border-radius: 4px;
    color: #fff; font-size: 13px; font-family: inherit;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #e2a308; outline: none; }
  .form-row textarea { resize: vertical; min-height: 50px; }
  .form-row select { cursor: pointer; }
  .form-row-inline { display: flex; gap: 8px; }
  .form-row-inline .form-row { flex: 1; }

  .btn { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-primary { background: #e2a308; color: #000; }
  .btn-primary:hover { background: #f0b429; }
  .btn-secondary { background: #2a2a4a; color: #ccc; border: 1px solid #444; }
  .btn-secondary:hover { background: #3a3a5a; }
  .btn-danger { background: #c0392b; color: #fff; }
  .btn-danger:hover { background: #e74c3c; }
  .btn-sm { padding: 4px 8px; font-size: 11px; }

  .export-bar { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .export-bar .btn { flex: 1; padding: 12px; font-size: 13px; min-width: 100px; }

  .inclusion-check { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; font-size: 12px; }
  .inclusion-check input[type="checkbox"] { margin-top: 2px; accent-color: #e2a308; }
  .inclusion-check label { color: #ccc; cursor: pointer; line-height: 1.3; }

  .sys-search-wrap { position: relative; }
  .sys-search-input {
    width: 100%; padding: 8px 10px; background: #0f3460; border: 1px solid #333; border-radius: 4px;
    color: #fff; font-size: 13px; font-family: inherit;
  }
  .sys-search-input:focus { border-color: #e2a308; outline: none; }
  .sys-search-input::placeholder { color: #667; }
  .sys-dropdown {
    display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
    background: #0f3460; border: 1px solid #e2a308; border-top: none; border-radius: 0 0 6px 6px;
    max-height: 340px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .sys-dropdown.open { display: block; }
  .sys-dropdown-item {
    padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #1a1a3a; transition: background 0.1s;
  }
  .sys-dropdown-item:hover, .sys-dropdown-item.highlighted { background: #1a2a5a; }
  .sys-dropdown-item:last-child { border-bottom: none; }
  .sys-dropdown-name { color: #fff; font-size: 13px; font-weight: 600; }
  .sys-dropdown-tags { color: #e2a308; font-size: 10px; margin-top: 2px; line-height: 1.3; }
  .sys-dropdown-match { color: #888; font-size: 10px; font-style: italic; margin-top: 1px; }
  .sys-dropdown-empty { padding: 12px; color: #666; font-size: 12px; text-align: center; }
  .sys-selected-tag {
    display: inline-flex; align-items: center; gap: 6px; background: #e2a308; color: #000;
    padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
  }
  .sys-selected-tag .tag-x {
    background: none; border: none; color: #000; font-size: 14px; cursor: pointer; font-weight: 700;
    padding: 0 0 0 4px; line-height: 1;
  }
  .sys-selected-tag .tag-x:hover { color: #c0392b; }

  .preview-panel { flex: 1; overflow-y: auto; background: #2d2d2d; padding: 30px; display: flex; justify-content: center; }
  .preview-scroll { width: 850px; }

  .form-card { background: #1e1e3a; border-radius: 8px; padding: 16px 20px; margin-bottom: 12px; border: 1px solid #2a2a4a; }
  .form-card h3 {
    color: #e2a308; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    border-bottom: 1px solid #333; padding-bottom: 6px; cursor: pointer; display: flex; align-items: center;
    user-select: none;
  }
  .form-card h3 .collapse-arrow { margin-right: 8px; font-size: 10px; transition: transform 0.2s; display: inline-block; }
  .form-card h3 .collapse-arrow.collapsed { transform: rotate(-90deg); }
  .form-card h3 .section-warn { margin-left: auto; color: #e2a308; font-size: 16px; font-weight: 700; line-height: 1; }
  .form-card .card-body { overflow: hidden; transition: max-height 0.3s ease; }
  .form-card .card-body.collapsed { max-height: 0 !important; overflow: hidden; padding: 0; margin: 0; }
  .form-card .form-row label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-card .form-row input, .form-card .form-row select, .form-card .form-row textarea {
    width: 100%; padding: 7px 9px; background: #0f3460; border: 1px solid #333; border-radius: 4px;
    color: #fff; font-size: 13px; font-family: inherit;
  }
  .form-card .form-row input:focus, .form-card .form-row select:focus, .form-card .form-row textarea:focus { border-color: #e2a308; outline: none; }
  .form-card .form-row textarea { resize: vertical; min-height: 50px; }
  .form-card .form-row select { cursor: pointer; }
  .form-card .form-row-inline { display: flex; gap: 8px; }
  .form-card .form-row-inline .form-row { flex: 1; }

  .repeater-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 6px; padding: 8px 10px; background: #12122a; border-radius: 4px; border: 1px solid #2a2a4a; }
  .repeater-row .form-row { margin-bottom: 0; flex: 1; }
  .repeater-row .form-row.narrow { flex: 0 0 80px; }
  .repeater-row .form-row.med { flex: 0 0 120px; }
  .repeater-row .btn-remove { flex: 0 0 28px; height: 28px; align-self: flex-end; margin-bottom: 0; background: #e74c3c; color: #fff; border: none; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
  .repeater-row .btn-remove:hover { background: #c0392b; }

  .procedure-section-block { background: #12122a; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid #2a2a4a; }
  .procedure-section-block .form-row { margin-bottom: 6px; }
  .procedure-step-row { display: flex; gap: 6px; margin-bottom: 4px; align-items: flex-start; }
  .procedure-step-row textarea { flex: 1; min-height: 40px; overflow: hidden; resize: none; }
  .procedure-step-row .step-num { flex: 0 0 24px; color: #e2a308; font-size: 12px; font-weight: 700; text-align: center; padding-top: 8px; }
  .procedure-step-row .btn-remove { flex: 0 0 28px; height: 28px; margin-top: 2px; background: #e74c3c; color: #fff; border: none; border-radius: 50%; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
  .procedure-step-row .btn-remove:hover { background: #c0392b; }

  .scope-section-block { background: #12122a; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid #2a2a4a; }

  .proposal-page {
    background: #fff; color: #000; font-family: 'Calibri', 'Segoe UI', sans-serif; font-size: 11pt;
    width: 816px; padding: 20px 60px 40px 60px;
    margin-bottom: 20px; position: relative; line-height: 1.4; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    box-sizing: border-box;
  }
  .proposal-page.export-page { height: 1056px; overflow: hidden; padding-top: 10px; padding-bottom: 80px; }
  .proposal-page * { color: #000; }
  .hti-header { position: relative; margin-bottom: 0; }
  .hti-logo-img { width: 100%; display: block; }
  .hti-header-overlay { position: absolute; bottom: 30px; right: 0; text-align: right; padding: 6px 0; }
  .hti-header-title { position: absolute; top: calc(50% + 8px); left: 176px; transform: translateY(-50%); text-align: left; line-height: 0.85; }
  .hti-header-title-main { font-size: 48pt; font-weight: 700; color: #000; font-family: Georgia, serif; }
  .hti-header-title-sub { font-size: 18pt; font-weight: 700; color: #000; font-family: Georgia, serif; }
  .hti-address { font-size: 11pt; color: #000; white-space: nowrap; }
  .hti-date { font-size: 10pt; color: #000; margin-top: 4px; }
  .page-num { font-size: 10pt; text-align: right; margin-bottom: 10px; color: #555; }
  .recipient { margin-bottom: 16px; font-size: 10.5pt; }
  .recipient strong { font-weight: 700; }
  .greeting { margin-bottom: 4px; }
  .intro-para { margin-bottom: 16px; }
  .section-label { font-weight: 700; text-decoration: underline; margin-top: 14px; margin-bottom: 6px; font-size: 11pt; }
  .section-label-nb { font-weight: 700; margin-top: 14px; margin-bottom: 6px; font-size: 11pt; }
  .scope-table { width: 100%; margin-bottom: 6px; border-collapse: collapse; }
  .scope-table td { padding: 2px 4px; vertical-align: top; font-size: 10.5pt; }
  .scope-table td:last-child { text-align: right; white-space: nowrap; }
  .products-list { margin-left: 20px; margin-bottom: 6px; }
  .products-list li { font-size: 10.5pt; margin-bottom: 2px; position: relative; }
  .procedures-doc-list { margin-left: 20px; margin-bottom: 6px; }
  .procedures-doc-list li { font-size: 10.5pt; margin-bottom: 4px; position: relative; }
  .cost-section { margin-bottom: 12px; }
  .cost-line { font-size: 10.5pt; margin-bottom: 4px; }
  .add-options-section { margin-bottom: 6px; }
  .add-options-section ol { margin-left: 24px; }
  .add-options-section li { font-size: 10.5pt; margin-bottom: 3px; position: relative; }
  .warranty-section { margin-bottom: 12px; font-size: 10.5pt; }
  .inclusions-list { margin-left: 20px; margin-bottom: 12px; padding-left: 0; }
  .inclusions-list li { font-size: 9.5pt; margin-bottom: 0; padding: 0; position: relative; line-height: 1.2; }
  .payment-section { margin-bottom: 16px; font-size: 10.5pt; }
  .payment-section strong { font-weight: 700; }
  .mobilization-section { margin-bottom: 20px; font-size: 10.5pt; }
  .mobilization-section strong { font-weight: 700; }
  .signoff { margin-top: 30px; font-size: 10.5pt; }
  .signoff .pm-name { font-weight: 600; }
  .acceptance-line { margin-top: 40px; font-size: 10.5pt; }
  .acceptance-line .line { display: inline-block; width: 250px; border-bottom: 1px solid #000; }
  .acceptance-line .line-sm { display: inline-block; width: 150px; border-bottom: 1px solid #000; }
  .page-footer {
    position: absolute; bottom: 20px; left: 60px; right: 60px; text-align: center;
    font-size: 7pt; color: #555; line-height: 1.3;
  }
  .page-footer .continued { font-weight: 700; font-size: 9pt; color: #000; margin-bottom: 8px; }
  .page-footer .confidential { font-weight: 700; font-size: 8pt; color: #000; margin-top: 4px; }
  .existing-conditions { margin-bottom: 12px; font-size: 10.5pt; }
  .existing-conditions strong { font-weight: 700; }
  .scope-row { display: flex; align-items: center; padding: 0; margin: 0; line-height: 1.1; }
  .scope-desc { flex: 1; }
  .scope-dash { padding: 0 8px; color: #999; }
  .scope-qty { text-align: right; white-space: nowrap; }
  .scope-semi { padding: 0 2px; color: #999; }
  .export-content { outline: none; cursor: text; margin-top: -40px; position: relative; z-index: 1; }
  .export-content:focus { outline: none; }

  @media print {
    body { background: #fff; }
    .top-bar { display: none !important; }
    .preview-panel { padding: 0; overflow: visible; background: #fff; }
    .preview-scroll { width: 100%; }
    .form-card { display: none !important; }
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #1a1a2e; }
  ::-webkit-scrollbar-thumb { background: #e2a308; border-radius: 4px; }

  .export-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999;
    justify-content: center; align-items: flex-start; padding: 30px; overflow-y: auto;
  }
  .export-modal-overlay.active { display: flex; }
  .export-modal {
    background: #1e1e2e; border-radius: 12px; padding: 24px; max-width: 900px; width: 100%;
  }
  .export-modal-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .export-modal-header h2 { color: #e2a308; margin: 0; font-size: 18px; }
  .export-modal-actions { display: flex; gap: 8px; }
  .export-modal-actions .btn { padding: 10px 24px; }
  .export-modal-pages { display: flex; flex-direction: column; align-items: center; gap: 20px; }
</style>
</head>

<div class="top-bar">
  <h1>HTI Proposal Builder</h1>

  <div class="bar-section">
    <label>Start from Previous Project</label>
    <select id="prevProjectSelect" onchange="loadPreviousProject(this.value); this.value='';" style="border-color:#e2a308;">
      <option value="">-- Select a Past Project --</option>
      <option value="continental-place">Continental Place - Loading Dock HTS (B+E, Feb 2026)</option>
      <option value="google-westlake">Google Westlake Ph2 - Polished Concrete (LCL, Aug 2025)</option>
      <option value="grant-courthouse">Grant County Courthouse - SGC Deck Traffic (Jan 2026)</option>
      <option value="grant-coroner">Grant County Coroner - Kitchen UC Resurfacing (Dec 2025)</option>
      <option value="kp-bellingham">King &amp; Prince - Bellingham Production (Feb 2026)</option>
      <option value="kp-line1">King &amp; Prince - Line 1 Patching (Nov 2025)</option>
      <option value="lineage-lynden">Lineage - Lynden Cranberry Dock MMA Sealer (Jan 2026)</option>
      <option value="mente-hangar">MENTE Hangar - Boeing Field Repairs (Jan 2026)</option>
      <option value="raedwood">Raedwood Cabinet Co. - HTS Flooring (Dec 2025)</option>
      <option value="safran-paintbooth">Safran Group - Paint Booth Anti-Graffiti (Mar 2026)</option>
      <option value="signature-slc">Signature Aviation - SLC Hangars 8 &amp; 12 (Jan 2026)</option>
      <option value="slim-chickens">Slim Chickens - Pasco Mac-Guard MMA (Feb 2026)</option>
      <option value="super1-kalispell">Super1 Foods - Kalispell UC Kitchen (Dec 2025)</option>
      <option value="uw-blakely">UW Blakely - Storage Grind &amp; Seal (Feb 2026)</option>
    </select>
    <div id="prevProjectTag"></div>
  </div>

  <div class="bar-section">
    <label>Flooring System Template</label>
    <div class="sys-search-wrap" id="sysSearchWrap">
      <input type="text" id="sysSearchInput" class="sys-search-input" placeholder="Search systems..." onclick="openSysDropdown()" oninput="filterSystems()" style="width:280px;">
      <div class="sys-dropdown" id="sysDropdown"></div>
    </div>
    <div id="sysSelectedTag"></div>
  </div>

  <div class="bar-section" style="margin-left: auto;">
    <button class="btn btn-primary" onclick="showExportPreview()">Preview &amp; Export PDF</button>
    <button class="btn btn-primary" onclick="showExportPreviewWord()">Preview &amp; Export Word</button>
    <button class="btn btn-secondary" onclick="window.print()">Print</button>
    <button class="btn btn-danger" onclick="resetToDefault()">Reset</button>
  </div>
</div>

<div class="main-content">
<div class="preview-panel">
  <div class="preview-scroll" id="previewContainer"></div>
</div>
</div>

// Track which sections are collapsed (persists across renders)
const collapsedSections = {};

function toggleSection(sectionId) {
  collapsedSections[sectionId] = !collapsedSections[sectionId];
  const body = document.getElementById('card-body-' + sectionId);
  const arrow = document.getElementById('arrow-' + sectionId);
  if (body) body.classList.toggle('collapsed');
  if (arrow) arrow.classList.toggle('collapsed');
}

// Check which sections have unfilled required fields
function getSectionWarnings() {
  const s = state;
  const w = {};
  // Project Info: projectName, city, state, systemDisplayName required
  if (!s.projectName.trim() || !s.projectCity.trim() || !s.projectState.trim() || !s.systemDisplayName.trim()) w['project-info'] = true;
  // Recipient: companyName required, contactName for GC
  if (!s.companyName.trim() || (s.clientType === 'gc' && !s.contactName.trim())) w['recipient'] = true;
  // Scope: at least one scope with desc and qty
  if (s.scopeSections.some(sec => !sec.name.trim() || sec.scopes.some(sc => !sc.desc.trim() || !sc.qty.trim()))) w['scope'] = true;
  // Products: at least one product with text
  if (s.products.length === 0 || s.products.some(p => !p.text.trim())) w['products'] = true;
  // Procedures: at least one step
  if (s.procedureSections.some(sec => sec.steps.length === 0 || sec.steps.some(st => !st.text.trim()))) w['procedures'] = true;
  // Cost: value required
  if (s.costSections.some(cs => !cs.value.trim())) w['cost'] = true;
  // Sign-off: pmName required
  if (!s.pmName.trim() || !s.pmCell.trim() || !s.pmEmail.trim()) w['signoff'] = true;
  return w;
}

function cardHeader(sectionId, title) {
  const warnings = getSectionWarnings();
  const isCollapsed = collapsedSections[sectionId];
  const warn = warnings[sectionId] ? '<span class="section-warn" title="Has unfilled fields">&#9888;</span>' : '';
  return `<h3 onclick="toggleSection('${sectionId}')"><span class="collapse-arrow${isCollapsed?' collapsed':''}" id="arrow-${sectionId}">&#9660;</span>${title}${warn}</h3><div class="card-body${isCollapsed?' collapsed':''}" id="card-body-${sectionId}">`;
}

function getIncText(inc) {
  if (inc.id === 'labor-rate') {
    const lt = state.laborType || 'open-shop';
    if (lt === 'open-shop') return "Pricing is not based on union or prevailing wage labor rates.";
    if (lt === 'prevailing') return "Work to be performed utilizing Prevailing Wage labor rates.";
    return "Work to be performed utilizing Union labor rates. Overtime, weekend, and holiday hours may result in increased labor rates.";
  }
  const ct = state.clientType;
  if (ct === 'direct' && inc.directText) return inc.directText;
  if (ct === 'gc' && inc.gcText) return inc.gcText;
  return inc.text || inc.gcText || inc.directText || '';
}

  INCLUSIONS_MASTER.forEach(inc => { state.inclusions[inc.id] = inc.default; });
  render();
}

function resetToDefault() {
  if (!confirm('Clear everything and return to the blank template?')) return;
  selectedSystemId = '';
  document.getElementById('sysSearchInput').value = '';
  document.getElementById('sysSelectedTag').innerHTML = '';
  document.getElementById('prevProjectSelect').value = '';

  Object.assign(state, {
    clientType: 'gc', laborType: 'open-shop',
    contactName: '', contactTitle: '', companyName: '', address: '', city: '', state: '', zip: '',
    projectName: '', projectCity: '', projectState: '',
    systemDisplayName: '',
    existingConditions: '',
    warrantyText: WARRANTIES['standard-1yr'],
    numMobilizations: '1', numPhases: '',
    pmName: '', pmCell: '', pmEmail: '',
    paymentTerms: '',
    scopeSections: [{ name: 'Installation of (System)', scopes: [{ desc: '(Flooring Scope)', qty: '', unit: 'Square Feet' }] }],
    products: [],
    procedureSections: [{ header: '', steps: [] }],
    taxNote: 'not-included',
    costSections: [{ description: '', value: '' }],
    addOptions: [
      { text: "A 480v 3-phase 50-amp generator can be added for an additional $1,850 per week." },
      { text: "Additional mobilization cost of $2,500 per mobilization." }
    ],
    inclusions: {},
    _warrantyType: 'standard-1yr'
  });

  INCLUSIONS_MASTER.forEach(inc => { state.inclusions[inc.id] = inc.default; });
  render();
}

// ============================================================
// LOAD SYSTEM
// ============================================================
let selectedSystemId = '';

function loadSystem(sysId) {
  if (!sysId || !SYSTEMS[sysId]) return;
  selectedSystemId = sysId;
  const sys = SYSTEMS[sysId];
  state.systemDisplayName = sys.displayName;
  state.products = sys.products.map(p => ({ text: p }));
  state.procedureSections = [{ header: sys.proceduresHeader, steps: sys.procedures.map(p => ({ text: p })) }];
  state.costSections = [{ description: '', value: '' }];
  state.scopeSections = [{ name: sys.scopeHeader, scopes: sys.defaultScopes.map(s => ({ ...s })) }];
  state.addOptions = [
    { text: "A 480v 3-phase 50-amp generator can be added for an additional $1,850 per week." },
    { text: "Additional mobilization cost of $2,500 per mobilization." }
  ];
  if (sys.warranty && WARRANTIES[sys.warranty]) {
    state.warrantyText = WARRANTIES[sys.warranty];
    state._warrantyType = sys.warranty;
  }
  const meta = SYSTEM_SEARCH[sysId];
  document.getElementById('sysSelectedTag').innerHTML = meta
    ? `<span class="sys-selected-tag">${escH(meta.label)}<button class="tag-x" onclick="clearSystem()">&times;</button></span>`
    : '';
  document.getElementById('sysSearchInput').value = '';
  document.getElementById('sysSearchInput').style.display = 'none';
  closeSysDropdown();
  render();
}

function clearSystem() {
  selectedSystemId = '';
  document.getElementById('sysSelectedTag').innerHTML = '';
  document.getElementById('sysSearchInput').style.display = '';
  document.getElementById('sysSearchInput').value = '';
}

function clearPrevProject() {
  const sel = document.getElementById('prevProjectSelect');
  sel.style.display = '';
  sel.value = '';
  const tag = document.getElementById('prevProjectTag');
  if (tag) tag.innerHTML = '';
}

// ============================================================
// SEARCHABLE SYSTEM DROPDOWN
// ============================================================
function openSysDropdown() {
  filterSystems();
  document.getElementById('sysDropdown').classList.add('open');
}

function closeSysDropdown() {
  document.getElementById('sysDropdown').classList.remove('open');
}

function filterSystems() {
  const query = document.getElementById('sysSearchInput').value.toLowerCase().trim();
  const dropdown = document.getElementById('sysDropdown');
  const keys = Object.keys(SYSTEM_SEARCH);
  let html = '';

  keys.forEach(sysId => {
    const meta = SYSTEM_SEARCH[sysId];
    const sys = SYSTEMS[sysId];
    if (!meta) return;

    const searchableChunks = [
      meta.label, ...meta.tags, ...meta.pastProjects, ...(sys.products || [])
    ].map(s => s.toLowerCase());

    if (query === '' || searchableChunks.some(chunk => chunk.includes(query))) {
      let matchNote = '';
      if (query) {
        const projMatch = meta.pastProjects.find(p => p.toLowerCase().includes(query));
        const tagMatch = meta.tags.find(t => t.toLowerCase().includes(query));
        const prodMatch = (sys.products || []).find(p => p.toLowerCase().includes(query));
        if (projMatch) matchNote = `Past project: ${projMatch}`;
        else if (prodMatch) matchNote = `Product: ${prodMatch}`;
        else if (tagMatch) matchNote = `Keyword: ${tagMatch}`;
      }

      html += `<div class="sys-dropdown-item" onclick="loadSystem('${sysId}')">
        <div class="sys-dropdown-name">${escH(meta.label)}</div>
        ${meta.pastProjects.length ? `<div class="sys-dropdown-tags">Projects: ${meta.pastProjects.join(', ')}</div>` : ''}
        ${matchNote ? `<div class="sys-dropdown-match">${escH(matchNote)}</div>` : ''}
      </div>`;
    }
  });

  if (!html) html = '<div class="sys-dropdown-empty">No systems match your search</div>';
  dropdown.innerHTML = html;
  dropdown.classList.add('open');
}

document.addEventListener('click', function(e) {
  const wrap = document.getElementById('sysSearchWrap');
  if (wrap && !wrap.contains(e.target)) closeSysDropdown();
});

// ============================================================
// LOAD PREVIOUS PROJECT
// ============================================================
function loadPreviousProject(projectId) {
  if (!projectId || !PREV_PROJECTS[projectId]) return;
  const p = PREV_PROJECTS[projectId];

  Object.assign(state, {
    clientType: p.clientType || 'gc',
    laborType: p.laborType || 'open-shop',
    contactName: p.contactName || '',
    contactTitle: p.contactTitle || '',
    companyName: p.companyName || '',
    address: p.address || '',
    city: p.city || '',
    state: p.state || '',
    zip: p.zip || '',
    projectName: p.projectName || '',
    projectCity: p.projectCity || '',
    projectState: p.projectState || '',
    systemDisplayName: p.systemDisplayName || '',
    existingConditions: p.existingConditions || '',
    warrantyText: (p.warrantyType && WARRANTIES[p.warrantyType]) ? WARRANTIES[p.warrantyType] : state.warrantyText,
    _warrantyType: p.warrantyType || 'standard-1yr',
    numMobilizations: p.numMobilizations || '1',
    numPhases: p.numPhases || '',
    pmName: p.pmName || '',
    pmCell: p.pmCell || '',
    pmEmail: p.pmEmail || '',
    paymentTerms: '',
    scopeSections: p.scopeSections
      ? p.scopeSections.map(sec => ({ name: sec.name, scopes: sec.scopes.map(s => ({...s})) }))
      : [{ name: p.scopeHeader || '', scopes: (p.scopes || []).map(s => ({...s})) }],
    products: (p.products || []).map(pr => ({...pr})),
    procedureSections: p.procedureSections
      ? p.procedureSections.map(sec => ({ header: sec.header, steps: sec.steps.map(s => ({...s})) }))
      : [{ header: p.proceduresHeader || '', steps: (p.procedures || []).map(pr => ({...pr})) }],
    taxNote: p.taxNote || (p.costSections && p.costSections[0] ? p.costSections[0].taxNote : 'not-included') || 'not-included',
    costSections: p.costSections
      ? p.costSections.map(sec => ({ description: sec.description || '', value: sec.value || '' }))
      : [{ description: p.costDescription || '', value: p.costValue || '' }],
    addOptions: (p.addOptions || []).map(a => ({...a}))
  });

  const sel = document.getElementById('prevProjectSelect');
  const label = sel.options[sel.selectedIndex]?.text || projectId;
  sel.style.display = 'none';
  const prevTag = document.getElementById('prevProjectTag');
  if (prevTag) prevTag.innerHTML = `<span class="sys-selected-tag">${escH(p.projectName || label)}<button class="tag-x" onclick="clearPrevProject()">&times;</button></span>`;

  render();
}

function applyWarrantyTemplate(wt) {
  if (WARRANTIES[wt] !== undefined) { state.warrantyText = WARRANTIES[wt]; state._warrantyType = wt; render(); }
}

// ============================================================
// INCLUSION CHECKS
// ============================================================
function renderInclusionChecks() {
  const container = document.getElementById('inclusionChecksForm');
  if (!container) return;
  container.innerHTML = INCLUSIONS_MASTER.map(inc => {
    const dt = getIncText(inc);
    return `<div class="inclusion-check">
      <input type="checkbox" id="inc-${inc.id}" ${state.inclusions[inc.id] ? 'checked' : ''}
        onchange="state.inclusions['${inc.id}']=this.checked;">
      <label for="inc-${inc.id}">${dt.substring(0, 80)}${dt.length > 80 ? '...' : ''}</label>
    </div>`;
  }).join('');
}
function checkAllInclusions() { INCLUSIONS_MASTER.forEach(i => state.inclusions[i.id] = true); renderInclusionChecks(); }
function uncheckAllInclusions() { INCLUSIONS_MASTER.forEach(i => state.inclusions[i.id] = false); renderInclusionChecks(); }

// ============================================================
// DOCUMENT ACTION FUNCTIONS
// ============================================================
function removeScope(sec, i) { state.scopeSections[sec].scopes.splice(i, 1); render(); }
function addScope(sec) { state.scopeSections[sec].scopes.push({ desc: '', qty: '', unit: 'Square Feet' }); render(); }
function moveScope(sec, i, dir) { swap(state.scopeSections[sec].scopes, i, dir); render(); }
function addScopeSection() { state.scopeSections.push({ name: 'New Scope Section', scopes: [{ desc: '', qty: '', unit: 'Square Feet' }] }); render(); }
function removeScopeSection(sec) { state.scopeSections.splice(sec, 1); render(); }
function syncScopeSection(sec, val) { if (state.scopeSections[sec]) state.scopeSections[sec].name = val; }
function addQty2(sec, i) { if (state.scopeSections[sec] && state.scopeSections[sec].scopes[i]) { state.scopeSections[sec].scopes[i].qty2 = ''; state.scopeSections[sec].scopes[i].unit2 = 'LF of Cove'; render(); } }
function removeProduct(i) { state.products.splice(i, 1); render(); }
function addProduct() { state.products.push({ text: '' }); render(); }
function moveProduct(i, dir) { swap(state.products, i, dir); render(); }
function removeProcedureStep(sec, i) { state.procedureSections[sec].steps.splice(i, 1); render(); }
function addProcedureStep(sec) { state.procedureSections[sec].steps.push({ text: '' }); render(); }
function addProcedureSection() { state.procedureSections.push({ header: '', steps: [] }); render(); }
function removeProcedureSection(sec) { state.procedureSections.splice(sec, 1); render(); }
function syncProcedureSectionHeader(sec, val) { if (state.procedureSections[sec]) state.procedureSections[sec].header = val; }
function syncCostField(sec, field, val) { if (state.costSections[sec]) state.costSections[sec][field] = val; }
function addCostSection() { state.costSections.push({ description: '', value: '' }); render(); }
function removeCostSection(sec) { state.costSections.splice(sec, 1); render(); }
function removeAddOption(i) { state.addOptions.splice(i, 1); render(); }
function addAddOption() { state.addOptions.push({ text: '' }); render(); }
function moveAddOption(i, dir) { swap(state.addOptions, i, dir); render(); }
function removeInclusion(id) { state.inclusions[id] = false; render(); }

function swap(arr, i, dir) {
  const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
}

function syncField(field, val) { state[field] = val; }
function syncScope(sec, i, key, val) { if (state.scopeSections[sec] && state.scopeSections[sec].scopes[i]) state.scopeSections[sec].scopes[i][key] = val; }
function syncProduct(i, val) { if (state.products[i]) state.products[i].text = val; }
function syncProcedure(sec, i, val) { if (state.procedureSections[sec] && state.procedureSections[sec].steps[i]) state.procedureSections[sec].steps[i].text = val; }
function syncAddOption(i, val) { if (state.addOptions[i]) state.addOptions[i].text = val; }

// ============================================================
// RENDER (Form Layout in right panel)
// ============================================================
function render() {
  const s = state;
  const ct = s.clientType;
  if (!s.laborType) s.laborType = 'open-shop';

  const taxTexts = {
    'not-included': 'Any applicable taxes are not included.',
    'plus-wsst': 'plus any applicable WSST.',
    'plus-state-tax': 'plus any applicable state sales tax.',
    'excludes-wsst': 'Price excludes any WSST.',
    'excluding-sales-tax': 'excluding sales tax.'
  };

  const wType = s._warrantyType || 'standard-1yr';

  let h = `<div class="form-card">${cardHeader('project-info','Project Info')}
    <div class="form-row"><label>Project Name</label><input value="${esc(s.projectName)}" onblur="syncField('projectName',this.value)" placeholder="e.g. Continental Place Loading Dock"></div>
    <div class="form-row"><label>System Display Name</label><input value="${esc(s.systemDisplayName)}" onblur="syncField('systemDisplayName',this.value)" placeholder="e.g. Performance HTS Flooring System"></div>
    <div class="form-row-inline">
      <div class="form-row"><label>Project City</label><input value="${esc(s.projectCity)}" onblur="syncField('projectCity',this.value)" placeholder="City"></div>
      <div class="form-row" style="flex:0 0 80px;"><label>State</label><input value="${esc(s.projectState)}" onblur="syncField('projectState',this.value)" placeholder="ST"></div>
    </div>
    <div class="form-row-inline">
      <div class="form-row"><label>Client Type</label>
        <select onchange="state.clientType=this.value; state.paymentTerms=''; render();">
          <option value="gc" ${ct==='gc'?'selected':''}>General Contractor (GC)</option>
          <option value="direct" ${ct==='direct'?'selected':''}>Direct Customer</option>
        </select>
      </div>
      <div class="form-row"><label>Labor Type</label>
        <select onchange="state.laborType=this.value; renderInclusionChecks();">
          <option value="open-shop" ${s.laborType==='open-shop'?'selected':''}>Open Shop</option>
          <option value="prevailing" ${s.laborType==='prevailing'?'selected':''}>Prevailing Wage</option>
          <option value="union" ${s.laborType==='union'?'selected':''}>Union Labor</option>
        </select>
      </div>
      <div class="form-row" style="flex:0 0 60px;"><label>Mobs</label><input value="${esc(s.numMobilizations)}" onblur="syncField('numMobilizations',this.value)" placeholder="1" style="text-align:center;"></div>
      <div class="form-row" style="flex:0 0 70px;"><label>Phases</label><input value="${esc(s.numPhases)}" onblur="syncField('numPhases',this.value)" placeholder="-" style="text-align:center;"></div>
    </div>
  </div></div>`;

  // RECIPIENT
  h += `<div class="form-card">${cardHeader("recipient","Recipient")}`;
  if (ct === 'gc') {
    h += `<div class="form-row-inline">
      <div class="form-row"><label>Contact Name</label><input value="${esc(s.contactName)}" onblur="syncField('contactName',this.value)" placeholder="Person's Name"></div>
      <div class="form-row"><label>Title</label><input value="${esc(s.contactTitle)}" onblur="syncField('contactTitle',this.value)" placeholder="Title (optional)"></div>
    </div>`;
  } else {
    h += `<div class="form-row"><label>Contact Name</label><input value="${esc(s.contactName)}" onblur="syncField('contactName',this.value)" placeholder="Contact Name"></div>`;
  }
  h += `<div class="form-row"><label>Company Name</label><input value="${esc(s.companyName)}" onblur="syncField('companyName',this.value)" placeholder="${ct==='gc'?'GC Name':'Customer Name'}"></div>
    <div class="form-row"><label>Address</label><input value="${esc(s.address)}" onblur="syncField('address',this.value)" placeholder="Street Address"></div>
    <div class="form-row-inline">
      <div class="form-row"><label>City</label><input value="${esc(s.city)}" onblur="syncField('city',this.value)" placeholder="City"></div>
      <div class="form-row" style="flex:0 0 60px;"><label>State</label><input value="${esc(s.state)}" onblur="syncField('state',this.value)" placeholder="ST"></div>
      <div class="form-row" style="flex:0 0 80px;"><label>ZIP</label><input value="${esc(s.zip)}" onblur="syncField('zip',this.value)" placeholder="ZIP"></div>
    </div>
  </div></div>`;

  // SCOPE OF WORK
  h += `<div class="form-card">${cardHeader("scope","Scope of Work")}`;
  s.scopeSections.forEach((sec, si) => {
    h += `<div class="scope-section-block">

        <div class="form-row" style="flex:1;"><label>Section Name</label><input value="${esc(sec.name)}" onblur="syncScopeSection(${si},this.value)" placeholder="Scope section name"></div>

      </div>`;
    sec.scopes.forEach((sc, i) => {

        <div class="form-row med"><label>Unit</label><input value="${esc(sc.unit)}" onblur="syncScope(${si},${i},'unit',this.value)" placeholder="Unit"></div>`;

      }
      h += `<button class="btn-remove" onclick="removeScope(${si},${i})">&times;</button></div>`;
    });
    h += `<button class="btn btn-secondary btn-sm" onclick="addScope(${si})" style="margin-top:4px;">+ Add Scope Line</button></div>`;
  });
  h += `<button class="btn btn-primary btn-sm" onclick="addScopeSection()" style="margin-top:6px;">+ Add Scope Section</button></div></div>`;

  // PRODUCTS
  h += `<div class="form-card">${cardHeader("products","Products")}`;
  s.products.forEach((p, i) => {
    h += `<div class="repeater-row">
      <div class="form-row"><input value="${esc(p.text)}" onblur="syncProduct(${i},this.value)" placeholder="Product name"></div>
      <button class="btn-remove" onclick="removeProduct(${i})">&times;</button></div>`;

  // COST & ADDITIONAL OPTIONS (merged)
  h += `<div class="form-card">${cardHeader("cost","Cost &amp; Additional Options")}
    <label style="font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; display:block;">Cost Sections</label>`;
  s.costSections.forEach((cs, ci) => {
    h += `<div class="repeater-row" style="flex-wrap:wrap;">
      <div class="form-row"><label>Description</label><input value="${esc(cs.description)}" onblur="syncCostField(${ci},'description',this.value)" placeholder="Cost description"></div>
      <div class="form-row med"><label>Value ($)</label><input value="${esc(cs.value)}" onblur="syncCostField(${ci},'value',this.value)" placeholder="e.g. 12,332"></div>
      ${s.costSections.length > 1 ? `<button class="btn-remove" onclick="removeCostSection(${ci})">&times;</button>` : ''}

  });
  h += `<button class="btn btn-secondary btn-sm" onclick="addCostSection()" style="margin-top:4px;">+ Add Cost Section</button>

      <label>Tax Note</label>

  // WARRANTY & INCLUSIONS (merged)
  h += `<div class="form-card">${cardHeader("warranty","Warranty &amp; Inclusions")}

      <select onchange="applyWarrantyTemplate(this.value);">

        <option value="standard-1yr-2yr-bond" ${wType==='standard-1yr-2yr-bond'?'selected':''}>1-Year Workmanship + 2-Year Bond</option>
        <option value="standard-1yr-moisture" ${wType==='standard-1yr-moisture'?'selected':''}>1-Year w/ Moisture Exclusion</option>
        <option value="hangar" ${wType==='hangar'?'selected':''}>Hangar (w/ Particulate Disclaimer)</option>
        <option value="exterior" ${wType==='exterior'?'selected':''}>Exterior (w/ Environmental Exclusion)</option>
        <option value="custom" ${wType==='custom'?'selected':''}>Custom (edit below)</option>
      </select>
    </div>
    <div class="form-row"><label>Warranty Text</label><textarea rows="4" onblur="syncField('warrantyText',this.value)">${escH(s.warrantyText)}</textarea></div>
    <label style="font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:0.5px; margin-top:10px; margin-bottom:6px; display:block; border-top:1px solid #333; padding-top:10px;">Inclusions &amp; Exclusions</label>
    <div id="inclusionChecksForm"></div>
    <div style="margin-top:6px; display:flex; gap:6px;">
      <button class="btn btn-secondary btn-sm" onclick="checkAllInclusions()">Select All</button>
      <button class="btn btn-secondary btn-sm" onclick="uncheckAllInclusions()">Deselect All</button>
    </div>
  </div></div>`;

  // PAYMENT TERMS
  let payDefault;
  if (ct === 'gc') {

// ============================================================
// SMART PAGINATION
// ============================================================
function smartPaginate(hdr, sections, footC, footF) {
  const USABLE = _exportUsable;
  const hdrH = _exportHdrH;

  const measurer = document.createElement('div');
  measurer.className = 'proposal-page export-page';
  measurer.style.cssText = 'position:absolute;left:-9999px;top:0;height:auto;overflow:visible;';
  document.body.appendChild(measurer);

  const measured = sections.map(sec => {
    measurer.innerHTML = sec.html;
    const h = measurer.firstElementChild ? measurer.firstElementChild.offsetHeight : 0;
    let items = null;
    if (sec.type === 'splittable') {
      const listEl = measurer.querySelector('ul, ol');
      if (listEl) {
        items = [];
        const headerEl = measurer.querySelector('.section-label-nb, .section-label');
        const headerH = headerEl ? headerEl.offsetHeight + 6 : 30;
        items.push({ type: 'header', height: headerH });
        Array.from(listEl.children).forEach(li => {
          items.push({ html: li.outerHTML, height: li.offsetHeight });
        });
      }
    }
    return { ...sec, height: h, items };
  });

  document.body.removeChild(measurer);

  const pages = [];
  let curSections = [];
  let curH = hdrH;

  for (let i = 0; i < measured.length; i++) {
    const sec = measured[i];
    if (curH + sec.height <= USABLE) {
      curSections.push(sec.html);
      curH += sec.height;
    } else if (sec.type === 'splittable' && sec.items && sec.items.length > 2) {
      const headerItem = sec.items[0];
      const listItems = sec.items.slice(1);
      const totalItems = listItems.length;
      let fitCount = 0;
      let runH = curH + headerItem.height;
      for (let j = 0; j < listItems.length; j++) {
        if (runH + listItems[j].height > USABLE) break;
        fitCount++;
        runH += listItems[j].height;
      }
      const pctDone = fitCount / totalItems;
      if (pctDone >= 0.2 && fitCount > 0) {
        const firstItems = listItems.slice(0, fitCount).map(it => it.html).join('');
        const remainItems = listItems.slice(fitCount).map(it => it.html).join('');
        const tmp = document.createElement('div');
        tmp.innerHTML = sec.html;
        const headerEl = tmp.querySelector('.section-label-nb, .section-label');
        const headerHTML = headerEl ? headerEl.outerHTML : '';
        const listTag = tmp.querySelector('ul') ? 'ul' : 'ol';
        const listClass = tmp.querySelector('ul, ol')?.className || '';
        curSections.push(`${headerHTML}<${listTag} class="${listClass}">${firstItems}</${listTag}>`);
        pages.push(curSections);
        curSections = [];
        curH = hdrH;
        const isUnderlined = sec.html.includes('section-label"');
        const contClass = isUnderlined ? 'section-label' : 'section-label-nb';
        const contHeader = `<div class="${contClass}" style="font-weight:700;">${sec.splitLabel}</div>`;
        const contHTML = `${contHeader}<${listTag} class="${listClass}">${remainItems}</${listTag}>`;
        curSections.push(contHTML);
        const m2 = document.createElement('div');
        m2.className = 'proposal-page export-page';
        m2.style.cssText = 'position:absolute;left:-9999px;top:0;height:auto;overflow:visible;';
        m2.innerHTML = contHTML;
        document.body.appendChild(m2);
        curH += m2.offsetHeight;
        document.body.removeChild(m2);
      } else {
        if (curSections.length > 0) { pages.push(curSections); curSections = []; curH = hdrH; }
        curSections.push(sec.html);
        curH += sec.height;
      }
    } else {
      if (curSections.length > 0) { pages.push(curSections); curSections = []; curH = hdrH; }
      curSections.push(sec.html);
      curH += sec.height;
    }
  }
  if (curSections.length > 0) pages.push(curSections);

  const totalPages = pages.length;
  return pages.map((sections, i) => {
    const pageNum = i > 0 ? `<div class="page-num">Page ${i + 1} of ${totalPages}:</div>` : '';
    const foot = i < totalPages - 1 ? footC : footF;
    return `<div class="proposal-page export-page">${hdr}${pageNum}<div class="export-content" contenteditable="true">${sections.join('')}</div>${foot}</div>`;
  }).join('');
}

let _exportHdr = '';
let _exportFootC = '';
let _exportFootF = '';
let _exportUsable = 800;
let _exportHdrH = 150;
let _reflowTimer = null;

function showExportPreview() {
  const { hdr, sections, footC, footF } = buildExportSections();

  const FOOTER_H = footerEl ? footerEl.offsetHeight + 50 : 110;
  document.body.removeChild(footMeasurer);
  _exportUsable = 956 - FOOTER_H;

  const hdrMeasurer = document.createElement('div');
  hdrMeasurer.className = 'proposal-page export-page';
  hdrMeasurer.style.cssText = 'position:absolute;left:-9999px;top:0;height:auto;overflow:visible;';

  document.body.appendChild(hdrMeasurer);
  _exportHdrH = hdrMeasurer.firstElementChild ? hdrMeasurer.firstElementChild.offsetHeight + 16 : 150;

function attachReflowListeners() {
  const previewEl = document.getElementById('exportPreviewPages');
  previewEl.addEventListener('input', () => {
    clearTimeout(_reflowTimer);
    _reflowTimer = setTimeout(reflowExportPages, 400);
  });
}

function saveCursorPosition() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  const previewEl = document.getElementById('exportPreviewPages');
  if (!previewEl.contains(range.startContainer)) return null;
  const walker = document.createTreeWalker(previewEl, NodeFilter.SHOW_TEXT);
  let charOffset = 0;
  let node;
  while (node = walker.nextNode()) {
    if (node === range.startContainer) return charOffset + range.startOffset;
    charOffset += node.textContent.length;
  }
  return null;
}

function restoreCursorPosition(globalOffset) {
  if (globalOffset === null) return;
  const previewEl = document.getElementById('exportPreviewPages');
  const walker = document.createTreeWalker(previewEl, NodeFilter.SHOW_TEXT);
  let charCount = 0;
  let node;
  while (node = walker.nextNode()) {
    const len = node.textContent.length;
    if (charCount + len >= globalOffset) {
      const range = document.createRange();
      range.setStart(node, globalOffset - charCount);
      range.collapse(true);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      const page = node.parentElement.closest('.proposal-page');
      if (page) page.scrollIntoView({ block: 'nearest' });
      return;
    }
    charCount += len;
  }
}

function reflowExportPages() {
  const previewEl = document.getElementById('exportPreviewPages');
  const cursorPos = saveCursorPosition();
  const allChildren = [];
  previewEl.querySelectorAll('.export-content').forEach(ec => {
    Array.from(ec.children).forEach(child => allChildren.push(child.outerHTML));
  });

  const measurer = document.createElement('div');
  measurer.className = 'proposal-page export-page';
  measurer.style.cssText = 'position:absolute;left:-9999px;top:0;height:auto;overflow:visible;';
  document.body.appendChild(measurer);
  const measured = allChildren.map(html => {
    measurer.innerHTML = html;
    return { html, height: measurer.firstElementChild ? measurer.firstElementChild.offsetHeight : 0 };
  });
  document.body.removeChild(measurer);

  const pages = [];
  let curPage = [];
  let curH = _exportHdrH;
  measured.forEach(sec => {
    if (curH + sec.height > _exportUsable && curPage.length > 0) {
      pages.push(curPage); curPage = []; curH = _exportHdrH;
    }
    curPage.push(sec.html); curH += sec.height;
  });
  if (curPage.length > 0) pages.push(curPage);

  const totalPages = pages.length;
  previewEl.innerHTML = pages.map((sections, i) => {
    const pageNum = i > 0 ? `<div class="page-num">Page ${i + 1} of ${totalPages}:</div>` : '';
    const foot = i < totalPages - 1 ? _exportFootC : _exportFootF;
    return `<div class="proposal-page export-page">${_exportHdr}${pageNum}<div class="export-content" contenteditable="true">${sections.join('')}</div>${foot}</div>`;
  }).join('');

  restoreCursorPosition(cursorPos);
}

function closeExportPreview() {
  document.getElementById('exportModal').classList.remove('active');
}

function confirmExportPDF() {
  const previewPages = document.getElementById('exportPreviewPages');
  const container = previewPages.cloneNode(true);
  container.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  container.querySelectorAll('.proposal-page').forEach(p => { p.style.boxShadow = 'none'; p.style.marginBottom = '0'; });

  const projectName = state.projectName || 'Draft';

  };
  html2pdf().set(opt).from(container).save();
  closeExportPreview();
}

  document.body.appendChild(hdrMeasurer);
  _exportHdrH = hdrMeasurer.firstElementChild ? hdrMeasurer.firstElementChild.offsetHeight + 16 : 150;
  document.body.removeChild(hdrMeasurer);

  const pagesHTML = smartPaginate(hdr, sections, footC, footF);
  const previewEl = document.getElementById('exportPreviewPagesWord');
  previewEl.innerHTML = pagesHTML;
  previewEl.querySelectorAll('.export-content').forEach(ec => ec.setAttribute('contenteditable', 'true'));
  document.getElementById('exportModalWord').classList.add('active');
}

function closeExportPreviewWord() {
  document.getElementById('exportModalWord').classList.remove('active');
}

function confirmExportWord() {
  const previewPages = document.getElementById('exportPreviewPagesWord');
  const container = previewPages.cloneNode(true);
  container.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  container.querySelectorAll('.proposal-page').forEach(p => { p.style.boxShadow = 'none'; p.style.marginBottom = '0'; });

  const styles = Array.from(document.querySelectorAll('style')).map(s => s.innerHTML).join('\n');
  const fullHTML = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>${styles}
body { margin: 0; padding: 0; }
.proposal-page { box-shadow: none !important; margin: 0 !important; }
</style></head><body>${container.innerHTML}</body></html>`;

  const converted = htmlDocx.asBlob(fullHTML, { orientation: 'portrait', margins: { top: 0, right: 0, bottom: 0, left: 0 } });
  const projectName = state.projectName || 'Draft';
  const filename = `HTI_Proposal_${projectName.replace(/[^a-zA-Z0-9]/g, '_')}_${new Date().toISOString().split('T')[0]}.docx`;
  saveAs(converted, filename);
  closeExportPreviewWord();
}

// INIT
init();

</script>

<!-- Export Preview Modal -->
<div class="export-modal-overlay" id="exportModal">
  <div class="export-modal">
    <div class="export-modal-header">
      <h2>Export Preview</h2>
      <div class="export-modal-actions">
        <button class="btn btn-secondary" onclick="closeExportPreview()">Back to Editor</button>
        <button class="btn btn-primary" onclick="confirmExportPDF()">Download PDF</button>
      </div>
    </div>
    <div class="export-modal-pages" id="exportPreviewPages"></div>
  </div>
</div>
<!-- Word Export Preview Modal -->
<div class="export-modal-overlay" id="exportModalWord">
  <div class="export-modal">
    <div class="export-modal-header">
      <h2>Word Export Preview</h2>
      <div class="export-modal-actions">
        <button class="btn btn-secondary" onclick="closeExportPreviewWord()">Back to Editor</button>
        <button class="btn btn-primary" onclick="confirmExportWord()">Download Word</button>
      </div>
    </div>
    <div class="export-modal-pages" id="exportPreviewPagesWord"></div>
  </div>
</div>
</body>
</html>
